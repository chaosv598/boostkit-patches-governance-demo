# features.yaml —— redis-6.0.20 特性声明
#
# 6.0.20 已 EOL(见 upstream.yaml meta.lifecycle=frozen),只保留 security-only 特性。
# 业界参照(命名惯例):OpenWrt/Buildroot/Yocto 均用 kebab-case 描述名。

features:

  # ─── Kunpeng ARM io_uring 适配(somaxconn/tcp-backlog 调优)───
  kunpeng-hw-accel:
    title: "Kunpeng ARM io_uring 适配(somaxconn/tcp-backlog 调优)"
    patches:
      - 0001-hw-kunpeng-adapt-iouring-on-6.0.15-6.0.20.patch
    depends: []
    default: true
    # 该 feature 在 patch overlay 中的"主导上游状态"(用于 dashboard 过滤)
    # 业界参照:Yocto recipe Upstream-Status 字段(单值枚举)
    upstream_status: Pending

# 历史说明:
#   6.0.20 早期有 kunpeng-hw-accel DTOE + jemalloc-arm64 两个特性,
#   因 EOL + 上游 6.0 已停维护,2026-Q1 全部迁移到 7.0.15 维护。
#   本仓保留 6.0.20 在 "frozen" 状态,只 apply 安全相关的 io_uring 适配,
#   给还没升级的客户继续接受安全补丁。