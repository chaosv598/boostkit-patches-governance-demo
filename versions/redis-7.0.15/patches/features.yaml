# features.yaml —— redis-7.0.15 特性声明
#
# 业界参照(命名惯例):
#   - OpenWrt  package/network/services/dnsmasq/          (kebab-case 描述名)
#   - Buildroot package/redis/                             (kebab-case 描述名)
#   - Yocto    recipes-core/redis/redis_7.0.15.bb          (kebab-case / snake_case)
#   - Kconfig  CONFIG_NETFILTER                           (UPPER_SNAKE,本仓 feature 仍用 kebab-case 跟目录一致)
#
# apply_patch.sh --features 本文件 [--active "kunpeng-hw-accel rdb-aof-fallback"]
# 自动 compose series。单一真相;patches/<feature>/<patch>.patch 是物理 patch
#
# 字段说明:
#   title           一句话描述
#   patches         该特性包含的 patch 文件列表(相对 patches/features/<feature>/)
#   depends         该特性依赖的其他特性(本特性被激活时,依赖项自动激活并先 apply)
#   default         是否默认激活(默认组合 = 所有 default:true 的并集)
#   upstream_status 摘要(本特性下 patch 整体上游状态;详细见 patch 邮件式头)
#
# 客户使用:
#   bash tools/apply_patch.sh <repo> <sha> \
#       --features versions/redis-7.0.15/patches/features.yaml \
#       versions/redis-7.0.15/patches /tmp/build
#   # 默认组合 = kunpeng-hw-accel + rdb-aof-fallback
#
#   ACTIVE_FEATURES="kunpeng-hw-accel jemalloc-arm64" bash tools/apply_patch.sh \
#       <repo> <sha> \
#       --features versions/redis-7.0.15/patches/features.yaml \
#       versions/redis-7.0.15/patches /tmp/build
#   # 客户只要 hw + jemalloc(无 aof-fallback)

features:

  # ─── Kunpeng ARM 硬件加速(io_uring + DTOE DMA 网络路径)───
  kunpeng-hw-accel:
    title: "Kunpeng ARM 硬件加速(io_uring 适配 + DTOE DMA 网络路径)"
    patches:
      - 0001-hw-kunpeng-adapt-iouring.patch
      - 0002-perf-kunpeng-adapt-dtoe.patch
    depends: []
    default: true
    upstream_status_summary:
      Submitted: 1
      Inappropriate: 1

  # ─── jemalloc ARM64 pointer-tag + GC decay 策略优化 ───
  jemalloc-arm64:
    title: "jemalloc ARM64 pointer-tag + GC decay 策略优化"
    patches:
      - 0001-perf-jemalloc-arm64-pointer-tag-and-gc.patch
    depends: []
    default: false
    upstream_status_summary:
      Submitted: 1

  # ─── RDB 损坏时降级到 AOF,避免硬停服 ───
  rdb-aof-fallback:
    title: "RDB 损坏时降级到 AOF,避免硬停服"
    patches:
      - 0001-perf-rdb-fallback-aof.patch
    depends: []
    default: true
    upstream_status_summary:
      Submitted: 1

  # ─── 业务组合示例(供运维参考,实际由 ACTIVE_FEATURES 决定) ───
  #
  # 安全合规客户(只跑稳定性 + 通用 HW):
  #   ACTIVE_FEATURES="kunpeng-hw-accel rdb-aof-fallback"
  #
  # 性能极限客户(全开):
  #   ACTIVE_FEATURES="kunpeng-hw-accel jemalloc-arm64 rdb-aof-fallback"
  #
  # 通用云服务客户(默认):
  #   ACTIVE_FEATURES="kunpeng-hw-accel rdb-aof-fallback"