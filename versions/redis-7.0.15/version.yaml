version_id: redis-7.0.15
description: Redis 7.0.15 patch overlay (BoostKit)
owner: chaosv598@boostkit

support:
  status: maintained
  planned_eol: 2027-06-30
  release_owner: chaosv598@boostkit

upstream_base:
  repo: https://github.com/redis/redis.git
  version: 7.0.15
  commit: f35f36a265403c07b119830aa4bb3b7d71653ec9

validation:
  hosted_image: ubuntu-24.04
  packages:
    - build-essential
    - pkg-config
    - tcl
  upstream_commands:
    - make -j2
    - make test
  boostkit_checks:
    - redis-functional-smoke
    - redis-benchmark-smoke

patches:
  - name: 0001-hw-kunpeng-adapt-iouring
    title: Adapt io_uring for Kunpeng ARM
    owner: twwang@boostkit
    type: ecological
    status: submitted
    pr: https://github.com/redis/redis/pull/12345
    dependence: []
    test_profile: redis-kraio-arm64

  - name: 0002-perf-kunpeng-adapt-dtoe
    title: Enable DTOE network optimization on Kunpeng
    owner: twwang@boostkit
    type: project
    status: accepted
    dependence: []
    test_profile: redis-dtoe-arm64
    exception:
      reason: |
        DTOE requires Kunpeng ARM64 hardware, openEuler kernel support,
        and dedicated DTOE libraries. No upstream equivalent abstraction.
      approved_by:
        - boostkit-component-maintainer
        - boostkit-architecture-owner
      approved_at: 2026-07-15
      review_due_at: 2026-10-13
      expires_at: 2027-01-11
      required_check: self-hosted/redis-dtoe-arm64
      evidence_max_age_days: 30

  - name: 0003-perf-jemalloc-arm64-pointer-tag-and-gc
    title: Adapt jemalloc 5.2.1 ARM64 pointer-tag and GC strategy optimize
    owner: yinbin@boostkit
    type: ecological
    status: submitted
    pr: https://github.com/redis/jemalloc/pull/9876
    dependence: []
    test_profile: jemalloc-arm64

  - name: 0004-perf-rdb-fallback-aof
    title: AOF fallback when RDB load fails at startup
    owner: dev@boostkit
    type: ecological
    status: submitted
    pr: https://github.com/redis/redis/pull/13579
    dependence: []
    test_profile: redis-fallback-smoke
