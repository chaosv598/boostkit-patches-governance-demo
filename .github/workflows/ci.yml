# Patch overlay CI —— 规范 §11 PR CI 实施
#
# 流程 (按规范 §11.1):
#   metadata/schema
#   → generate manifest (artifact, NOT committed back)
#   → fetch exact upstream baseline
#   → apply patches in YAML array order
#   → upstream style/static checks
#   → build
#   → upstream UT
#   → functional smoke
#   → performance smoke
#   → upload evidence
#
# 规范 §11.4:
#   - 默认 token 只读
#   - actions 锁 commit SHA (demo 用 @v4 tag,生产替换为真 40-char SHA)
#   - 禁止自动 commit/push manifest、白名单、测试结果
#   - 网络错误可重跑,不得跳过验证返回成功
#   - 日志、manifest、UT、性能结果必须 upload artifact
#
# 注:hardware-check job (规范 §11.3) 需要 self-hosted runner + redis-dtoe-arm64 label,
#    本仓 demo 不带真实硬件,在真实生产环境应开启。

name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 默认 token 最小权限:只读 (规范 §11.4)
permissions:
  contents: read

jobs:
  verify:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4   # 规范 §11.4 要求锁 SHA,生产应替换为 40 字符真 SHA

      - name: Install python deps
        run: pip install pyyaml --quiet

      - name: Install build deps
        run: |
          set -euxo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config tcl

      # 1. metadata/schema (§11.1 阶段 1)
      - name: Verify (schema + patches/ consistency + apply dry-run)
        run: bash tools/verify.sh

      # 2. generate manifest (artifact, NOT committed) (§9 + §11.1 阶段 2)
      - name: Generate manifest
        run: bash tools/sync-manifest.py

      # 3+4. upstream apply dry-run + lint (§11.1 阶段 3-4)
      #    (verify.sh 已完成 apply dry-run;lint 在此)
      - name: Upstream lint
        run: |
          if ls versions/*/patches/*.patch 2>/dev/null | head -1 >/dev/null; then
            bash tools/upstream-lint.sh versions/*/patches/*.patch
          fi

      # 5. 白名单审计 (§8)
      - name: Whitelist audit
        run: bash tools/whitelist-audit.py --strict

      # 6. 上传 manifest + 验证证据 (§11.1 末尾)
      - name: Upload manifest
        if: always()
        uses: actions/upload-artifact@v4   # 规范 §11.4 要求锁 SHA
        with:
          name: patches-manifest
          path: out/patches-manifest.json
          retention-days: 90

      - name: Upload verify log
        if: always()
        uses: actions/upload-artifact@v4   # 规范 §11.4 要求锁 SHA
        with:
          name: verify-log
          path: artifacts/verify.log
          retention-days: 30

  # 规范 §11.3 硬件 check — 在真实生产环境启用,需要 self-hosted runner + 硬件 label
