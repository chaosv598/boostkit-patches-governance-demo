# Patch overlay CI —— v6.0 Buildroot 精简模型
#
# 流程:
#   1. tools/verify.sh   —— 仓根禁放 + manifest.yaml schema + clean apply
#   2. .github/lint.py manifest —— manifest.yaml schema + depends + DEP-3 必填
#   3. .github/lint.py headers  —— patch 头 schema 校验
#
# v5.1: 删掉 gen_inventory.py
# v5.2: lint_patch_headers.py + lint_series.py 合并为 lint.py
# v6.0: 两个 YAML 合并为 manifest.yaml，去掉 patches/features/ 嵌套，子命令 features→manifest
#
# 失败策略: 任何一项 fail = block merge

name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pyyaml
        run: pip install pyyaml --quiet

      - name: Verify (structure + clean apply)
        run: bash tools/verify.sh

      - name: Manifest lint
        run: python3 .github/lint.py manifest versions/*/

      - name: Patch header lint
        run: python3 .github/lint.py headers versions/*/
