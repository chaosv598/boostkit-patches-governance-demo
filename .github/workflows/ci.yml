# Patch overlay CI —— 规范 §8.1 实施
#
# 流程 (按规范 §8.1 ci.yml):
#   1. tools/sync-manifest.py --check   (PATCHES.yaml / WHITELIST.yaml / docs/PATCHES-STATUS.md 与 version.yaml 一致)
#   2. yaml schema 校验 (verify.sh 第 2 阶段)
#   3. patch 文件名格式校验 (verify.sh 第 2 阶段)
#   4. upstream apply dry-run (verify.sh 第 3 阶段)
#   5. whitelist_reason 字数 + reason 文本检查
#
# 失败策略 (规范 §8.2):
#   - ci.yml 任何一项 fail = block merge
#   - build-perf build 失败 = block merge
#   - build-perf bench 异常 = warn 不 block
#   - upstream-test 失败 = warn, owner 解释
#
# sync-manifest drift 自动化 (规范 §8.3):
#   - merge 前 PATCHES.yaml 必须与 version.yaml 推导结果完全一致
#   - drift 时 CI 自动 commit 修复并 push

name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # sync-manifest --write 时需要 commit/push

jobs:
  verify:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pyyaml
        run: pip install pyyaml --quiet

      # 1. sync-manifest drift 检测 (§8.1 阶段 1) — 不 exit 1,把 drift 标志传给下一步
      - name: Sync manifest check
        id: sync-check
        run: |
          set +e
          python3 tools/sync-manifest.py --check
          rc=$?
          set -e
          if [ "$rc" = "0" ]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "fix_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "fix_needed=true" >> "$GITHUB_OUTPUT"
          fi

      # 1.5 drift 自动修复 + push (规范 §8.3) — 只在确实 drift 时跑
      # push 目标:PR 触发时推到 PR head ref,push master / workflow_dispatch 时推到当前 ref
      #   - github.head_ref: PR 触发时 = PR 源分支(如 test/fix-foo);其他触发时为空
      #   - github.ref_name: push/workflow_dispatch 时 = 分支名(如 master)
      #   - 默认空字符串 fallback 到 master,避免 detached HEAD 下 `git push` 失败
      - name: Auto-fix manifest drift
        if: steps.sync-check.outputs.fix_needed == 'true'
        run: |
          python3 tools/sync-manifest.py --write
          git config user.name "boostkit-bot"
          git config user.email "boostkit-bot@boostkit"
          git add PATCHES.yaml WHITELIST.yaml docs/PATCHES-STATUS.md
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "manifest: auto-sync from version.yaml [skip ci]"
            target_ref="${{ github.head_ref || github.ref_name }}"
            target_ref="${target_ref:-master}"
            echo "push target: origin HEAD:$target_ref"
            git push "origin" "HEAD:$target_ref"
          fi

      # 2-4. yaml schema + 文件名 + apply dry-run (verify.sh)
      - name: Verify (schema + apply dry-run)
        run: bash tools/verify.sh

      # 5. whitelist 审计 (§4.4)
      - name: Whitelist audit
        run: python3 tools/whitelist-audit.py --strict
