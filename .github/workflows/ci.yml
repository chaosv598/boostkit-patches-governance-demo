# Patch overlay CI —— v5.0 模型
#
# 流程 (按 docs/version-yaml-spec.md + docs/governance.md):
#   1. tools/verify.sh        —— 仓根禁放 + upstream.yaml schema + clean clone + features.yaml compose + apply + inventory 派生刷新
#   2. .github/lint_patch_headers.py —— patch 邮件式头 schema 校验
#   3. .github/lint_series.py —— features.yaml schema + depends 解析 + DEP-3 必填字段(v5.0 替代 v4.0 的 series 一致性)
#   4. tools/gen_inventory.py --check —— 派生 inventory.json 与 patch 头 + features.yaml 一致
#
# 失败策略:
#   - ci.yml 任何一项 fail = block merge
#   - build-perf build 失败 = block merge
#   - build-perf bench 异常 = warn 不 block

name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pyyaml
        run: pip install pyyaml --quiet

      # 1. 结构 + clean apply(tools/verify.sh)
      - name: Verify (structure + clean apply)
        run: bash tools/verify.sh

      # 2. patch 邮件式头 schema
      - name: Patch header schema lint
        run: python3 .github/lint_patch_headers.py versions/*/patches/

      # 3. features.yaml schema + patch 头一致性
      - name: Features.yaml + patch headers lint
        run: python3 .github/lint_series.py versions/*/patches/

      # 4. inventory 派生物一致(单跑 check,差异 > 0 即 fail;verify.sh 已经写过一遍)
      - name: Inventory consistency check
        run: python3 tools/gen_inventory.py --check versions/*/