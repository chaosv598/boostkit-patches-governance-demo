# build-perf —— clean upstream apply + 编译 + memtier_benchmark 性能基准
#
# 流程 (按 docs/governance.md §3.2):
#   1. paths-filter 检测 versions/*/ 改动 → matrix
#   2. 每个 affected version: clone upstream → 按 series apply → make → memtier
#   3. 上传 memtier.log + summary.md → 写 Job Summary
#
# 输入: versions/<v>/upstream.yaml + patches/series + patches/*.patch
# 输出: artifacts/<v>/{memtier.log, summary.md}
#
# 触发:
#   - push master: 合并后跑一次,作为正式入库前的 smoke
#   - workflow_dispatch: 真 Kunpeng runner 手动触发(performance / nightly)
#   - schedule: 每周一次 nightly(可在 self-hosted runner 上跑)
#
# 注意:此 workflow 不在 pull_request 上自动跑。原因:编译依赖
# BoostKit 内核侧 KRAIO SDK(参见 README "兼容性")— 只有真 Kunpeng 机器
# 才有该头文件,普通 ubuntu-22.04 GHA runner 必然失败。PR 上由 ci.yml 的
# verify.sh(clean clone + apply series + lint)把关。

name: build-perf

on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    # 每周一 02:00 UTC nightly
    - cron: "0 2 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # === 第 1 步:检测哪些 versions 改动 → 构造 matrix ===
  changes:
    name: detect changed versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version changes
        id: build
        run: |
          # 读 versions/<v>/upstream.yaml 构造 matrix
          python3 - > "$GITHUB_OUTPUT" << 'PYEOF'
          import os, glob, yaml, json
          matrix = []
          for uyaml in sorted(glob.glob("versions/*/upstream.yaml")):
              vid = os.path.basename(os.path.dirname(uyaml))
              with open(uyaml) as f:
                  m = yaml.safe_load(f)
              up = m.get("upstream", {})
              matrix.append({
                  "version_id": vid,
                  "repo": up.get("repo"),
                  "commit": up.get("commit"),
                  "version": up.get("version"),
              })
          print("matrix=" + json.dumps({"include": matrix}))
          PYEOF

  # === 第 2 步:每个 affected version 跑 build + bench ===
  build-perf:
    name: build + bench (${{ matrix.version_id }})
    needs: changes
    if: needs.changes.outputs.matrix != '' && needs.changes.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}

    env:
      VID: ${{ matrix.version_id }}
      UPSTREAM_REPO: ${{ matrix.repo }}
      UPSTREAM_COMMIT: ${{ matrix.commit }}
      UPSTREAM_VERSION: ${{ matrix.version }}
      REDIS_PORT: 6399

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build deps + memtier from source
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            tcl tcl-dev libssl-dev libevent-dev
          cd /tmp
          git clone --depth 1 --branch 2.1.0 --quiet https://github.com/RedisLabs/memtier_benchmark.git
          (cd memtier_benchmark && autoreconf -ivf && ./configure --quiet && make -j$(nproc) && sudo make install)
          which memtier_benchmark
          memtier_benchmark --version

      - name: Cache upstream clone
        id: cache-upstream
        uses: actions/cache@v4
        with:
          path: /tmp/${{ env.VID }}/upstream
          key: upstream-${{ env.VID }}-${{ env.UPSTREAM_COMMIT }}
          restore-keys: upstream-${{ env.VID }}-

      - name: Build patched redis
        run: |
          VID="$VID" UPSTREAM_REPO="$UPSTREAM_REPO" UPSTREAM_COMMIT="$UPSTREAM_COMMIT" bash << 'BUILDSCRIPT'
          set -euo pipefail
          WORK="/tmp/${VID}"
          mkdir -p "$WORK" "$GITHUB_WORKSPACE/artifacts/${VID}"
          cd "$WORK"

          # 1) clone upstream (cache 复用;浅克隆 + 拉 tag + 按需按 SHA fetch)
          #    --depth 1 + 默认拉 tag 拿到 refs/tags/<version> 的 tag 对象;
          #    若目标 commit 不在 default branch 历史里,按 SHA 单 commit 深 fetch 一次
          if [ ! -d "upstream/.git" ]; then
            git clone --depth 1 "$UPSTREAM_REPO" upstream 2>&1 | tail -3
          fi

          # 2) fetch target commit
          cd upstream
          if ! git cat-file -t "$UPSTREAM_COMMIT" >/dev/null 2>&1; then
            git fetch --depth 1 origin "$UPSTREAM_COMMIT" 2>&1 | tail -1 || \
              { git fetch --unshallow origin 2>&1 | tail -1; git fetch --tags origin 2>&1 | tail -1; } || true
          fi
          git checkout -q "$UPSTREAM_COMMIT"
          echo "upstream HEAD: $(git rev-parse --short HEAD)"
          cd ..

          # 3) 按 series apply
          SERIES="$GITHUB_WORKSPACE/versions/${VID}/patches/series"
          mapfile -t ENTRIES < <(grep -vE '^\s*(#|$)' "$SERIES")
          echo "apply ${#ENTRIES[@]} patches from series..."
          for p in "${ENTRIES[@]}"; do
            p=$(echo "$p" | sed 's/[[:space:]]*$//')
            [ -z "$p" ] && continue
            if (cd upstream && git apply "$GITHUB_WORKSPACE/versions/${VID}/patches/$p"); then
              echo "  ✓ $p"
            else
              echo "  ✗ $p: apply 失败"
              exit 1
            fi
          done

          # 4) make (把输出落到 log 避免 pipe 吞失败退出码)
          cd upstream
          make distclean 2>&1 | tail -3 || true
          make_log="$WORK/make.log"
          if ! make -j$(nproc) >"$make_log" 2>&1; then
            make_rc=$?
            echo "make 失败 (rc=$make_rc)"
            tail -30 "$make_log"
            exit 1
          fi
          tail -5 "$make_log"
          BUILDSCRIPT

      - name: Run memtier_benchmark
        run: |
          VID="$VID" REDIS_PORT="$REDIS_PORT" bash << 'BENCHSCRIPT'
          set -euo pipefail
          WORK="/tmp/${VID}"
          BIN="$WORK/upstream/src"
          ART="$GITHUB_WORKSPACE/artifacts/${VID}"
          mkdir -p "$ART"

          # 1) start redis-server (background)
          "$BIN/redis-server" \
            --port "$REDIS_PORT" --bind 127.0.0.1 --daemonize yes \
            --pidfile "$WORK/redis.pid" \
            --dir "$WORK" --dbfilename dump.rdb \
            --save '' --appendonly no \
            --maxmemory 256mb --maxmemory-policy allkeys-random \
            --logfile "$WORK/redis.log"

          # 等 PONG
          retries=30
          while [ $retries -gt 0 ]; do
            if "$BIN/redis-cli" -p "$REDIS_PORT" ping 2>/dev/null | grep -q PONG; then
              echo "redis up"; break
            fi
            sleep 0.5
            retries=$((retries-1))
          done
          [ $retries -eq 0 ] && { echo "redis 启动超时"; cat "$WORK/redis.log"; exit 1; }

          # 2) redis-benchmark -q (BoostKit 文档命令)
          "$BIN/redis-benchmark" \
            -h 127.0.0.1 -p "$REDIS_PORT" \
            -c 200 -d 3 -n 10000000 -r 10000000 \
            -t set,get --threads 20 -q 2>&1 | tee "$ART/memtier.log"

          # 3) shutdown
          "$BIN/redis-cli" -p "$REDIS_PORT" shutdown nosave 2>/dev/null || true

          # 4) parse → summary.md
          python3 - "$ART/memtier.log" "$VID" > "$ART/summary.md" << 'PYEOF'
          import sys, re
          log_path, version = sys.argv[1], sys.argv[2]
          text = open(log_path).read()
          set_m = re.search(r'^\s*SET\s*:\s*([\d.]+)\s+requests per second', text, re.M | re.I)
          get_m = re.search(r'^\s*GET\s*:\s*([\d.]+)\s+requests per second', text, re.M | re.I)
          set_r = float(set_m.group(1)) if set_m else 0
          get_r = float(get_m.group(1)) if get_m else 0
          print(f"## build-perf report - {version}\n")
          print("| metric | SETs | GETs |")
          print("|---|---|---|")
          print(f"| ops/sec | {set_r:.0f} | {get_r:.0f} |")
          print(f"| p50 latency (ms) | - | - |")
          print(f"| p99 latency (ms) | - | - |")
          print(f"| p99.9 latency (ms) | - | - |\n")
          print("_参考 BoostKit redis_network_async_optimization_feature_guide.md (redis-benchmark -q)_")
          PYEOF
          BENCHSCRIPT

      - name: Upload memtier raw log
        uses: actions/upload-artifact@v4
        with:
          name: memtier-${{ env.VID }}
          path: artifacts/${{ env.VID }}/memtier.log
          retention-days: 30

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ env.VID }}
          path: artifacts/${{ env.VID }}/summary.md
          retention-days: 30

      - name: Post report to job summary
        if: always()
        run: |
          if [ -f "artifacts/${{ env.VID }}/summary.md" ]; then
            {
              echo "### build-perf · ${{ env.VID }}"
              echo
              cat "artifacts/${{ env.VID }}/summary.md"
            } >> "$GITHUB_STEP_SUMMARY"
          fi